[build]
output_directory = "site"
working_directory = ".build"
staged_source_directory = "source"
quarto_project_directory = "quarto"
cache_directory = "cache"

[tools]
quarto_fallback = "/Applications/Positron.app/Contents/Resources/app/quarto/bin/quarto"
pandoc = "pandoc"
xelatex = "xelatex"
dvisvgm = "dvisvgm"
ghostscript = "gs"

[images]
tikz_format = "auto"
tikz_png_fallback = true
tikz_raster_dpi = 480
tikz_min_raster_width = 1920
tikz_max_raster_dpi = 2400
tikz_border_points = 6
tikz_svg_precision = 4
tikz_text_as_paths = true
computation_preferred_format = "svg"
computation_raster_dpi = 192
computation_min_raster_width = 1920
computation_min_pixel_ratio = 2.0

[render]
language = "zh"
toc_depth = 3
sidebar_width_px = 305
body_width_px = 920
margin_width_px = 230
gutter_rem = 1.4

[assets]
copy = [
  "density-loader.js",
  "density-math.js",
  "density-plots.js",
  "density-probe.js",
  "formula-copy.js",
  "textbook-theme.js",
  "textbook-toc.js",
  "textbook-ui.js",
  "favicon.svg",
  "textbook.csl",
]
quarto_resources = [
  "density-plots.js",
  "density-loader.js",
  "density-math.js",
  "density-probe.js",
  "formula-copy.js",
  "textbook-theme.js",
  "textbook-toc.js",
  "textbook-ui.js",
  "favicon.svg",
]
style_bundle = "style.css"
style_sources = [
  "styles/00-foundation.css",
  "styles/10-shell.css",
  "styles/20-content.css",
  "styles/30-reference-computation.css",
  "styles/40-home.css",
  "styles/50-dark.css",
  "styles/60-formula.css",
  "styles/70-density.css",
  "styles/80-responsive.css",
  "styles/90-project.css",
]
header_template = "theme-toggle.html"

[assets.version_placeholders]
__TEXTBOOK_THEME_VERSION__ = "textbook-theme.js"
__TEXTBOOK_TOC_VERSION__ = "textbook-toc.js"
__TEXTBOOK_UI_VERSION__ = "textbook-ui.js"
__FORMULA_COPY_VERSION__ = "formula-copy.js"
__DENSITY_LOADER_VERSION__ = "density-loader.js"
