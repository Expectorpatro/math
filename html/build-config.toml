[build]
output_directory = "site"
working_directory = ".build"
staged_source_directory = "source"
quarto_project_directory = "quarto"
cache_directory = "cache"

[tools]
quarto_fallback = "/Applications/Positron.app/Contents/Resources/app/quarto/bin/quarto"
pandoc = "pandoc"
xelatex = "xelatex"
ghostscript = "gs"
git = "git"

[images]
tikz_raster_dpi = 480
tikz_min_raster_width = 1920
tikz_max_raster_dpi = 2400
tikz_border_points = 6
computation_min_raster_width = 1920
computation_min_pixel_ratio = 2.0

[render]
language = "zh"
toc_depth = 3
sidebar_width_px = 305
body_width_px = 920
margin_width_px = 230
gutter_rem = 1.4

[assets]
public_sources = [
  "scripts/density-loader.js",
  "scripts/density-math.js",
  "scripts/density-distributions.js",
  "scripts/density-plots.js",
  "scripts/density-probe.js",
  "scripts/density-renderer.js",
  "scripts/formula-copy.js",
  "scripts/textbook-theme.js",
  "scripts/textbook-toc.js",
  "scripts/textbook-ui.js",
  "scripts/textbook-content-ui.js",
  "scripts/textbook-reading.js",
  "scripts/textbook-page-ui.js",
  "assets/favicon.svg",
]
citation_style_source = "assets/textbook.csl"
style_bundle = "style.css"
style_sources = [
  "styles/foundation.css",
  "styles/shell.css",
  "styles/content.css",
  "styles/reference-computation.css",
  "styles/home.css",
  "styles/dark.css",
  "styles/formula.css",
  "styles/density.css",
  "styles/responsive.css",
  "styles/project-home.css",
  "styles/project-pages.css",
  "styles/reading.css",
]
header_template_source = "templates/theme-toggle.html"
