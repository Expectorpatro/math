<script>
(() => {
  "use strict";
  try {
    const theme = window.localStorage.getItem("textbook-color-scheme");
    if (theme === "dark" || theme === "light") {
      window.localStorage.setItem(
        "quarto-color-scheme",
        theme === "dark" ? "alternate" : "default"
      );
    }
  } catch (_error) {
    // Storage can be unavailable; Quarto's default theme still works.
  }

  const mathJax = window.MathJax || {};
  mathJax.tex = mathJax.tex || {};
  mathJax.tex.macros = {
    ...(mathJax.tex.macros || {}),
    dif: "\\mathop{}\\!\\mathrm{d}",
    seq: ["#1_1,#1_2,\\dots,#1_{#2}", 2],
    varLambda: "\\mathit{\\Lambda}",
  };
  window.MathJax = mathJax;

  const loadUserInterface = () => {
    if (document.querySelector('script[data-textbook-ui]')) return;
    const stylesheet = Array.from(
      document.querySelectorAll('link[rel="stylesheet"]')
    ).find((link) =>
      /(?:^|\/)style\.css(?:[?#]|$)/.test(link.getAttribute("href") || "")
    );
    const base = stylesheet
      ? new URL(stylesheet.href)
      : new URL(window.location.href);
    const script = document.createElement("script");
    script.dataset.textbookUi = "true";
    script.src = new URL("textbook-ui.js", base).href;
    script.async = false;
    document.head.appendChild(script);
  };

  // Quarto emits this include before the page-specific stylesheet links.
  // Waiting for the parsed document makes the same loader work at the site
  // root and in nested chapter routes, including GitHub Pages subpaths.
  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", loadUserInterface, {
      once: true,
    });
  } else {
    loadUserInterface();
  }
})();
</script>
