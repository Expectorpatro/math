<script>
(() => {
  "use strict";

  document.documentElement.classList.add("js");
  try {
    const theme = window.localStorage.getItem("textbook-color-scheme");
    if (theme === "dark" || theme === "light") {
      window.localStorage.setItem(
        "quarto-color-scheme",
        theme === "dark" ? "alternate" : "default"
      );
    }
  } catch (_error) {
    // Storage is optional; Quarto's configured default remains usable.
  }

  const mathJax = window.MathJax || {};
  mathJax.tex = mathJax.tex || {};
  mathJax.tex.macros = {
    ...(mathJax.tex.macros || {}),
    dif: "\\mathop{}\\!\\mathrm{d}",
    seq: ["#1_1,#1_2,\\dots,#1_{#2}", 2],
    varLambda: "\\mathit{\\Lambda}",
  };
  window.MathJax = mathJax;

  const assetBase = () => {
    const offset = document.querySelector('meta[name="quarto:offset"]');
    if (offset?.content) return new URL(offset.content, document.baseURI);
    const stylesheet = Array.from(
      document.querySelectorAll('link[rel="stylesheet"]')
    ).find((link) =>
      /(?:^|\/)style\.css(?:[?#]|$)/.test(link.getAttribute("href") || "")
    );
    return stylesheet ? new URL(".", stylesheet.href) : new URL(".", document.baseURI);
  };

  const loadScript = (name, version, marker) => {
    if (document.querySelector(`script[data-textbook-asset="${marker}"]`)) {
      return;
    }
    const url = new URL(name, assetBase());
    url.searchParams.set("v", version);
    const script = document.createElement("script");
    script.src = url.href;
    script.async = false;
    script.dataset.textbookAsset = marker;
    script.addEventListener("error", () => {
      console.error(`[textbook] 无法加载前端资源：${name}`);
    });
    document.head.appendChild(script);
  };

  const bootstrap = () => {
    loadScript("textbook-ui.js", "__TEXTBOOK_UI_VERSION__", "ui");
    if (document.querySelector(".display-math-copy-marker")) {
      loadScript("formula-copy.js", "__FORMULA_COPY_VERSION__", "formula-copy");
    }
    if (document.querySelector(".density-plot[data-distribution]")) {
      loadScript("density-loader.js", "__DENSITY_LOADER_VERSION__", "density");
    }
  };

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", bootstrap, { once: true });
  } else {
    bootstrap();
  }
})();
</script>
